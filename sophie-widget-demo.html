<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sophie Widget Demo</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-soft: #eff0f3;
      --border: #e3e5ea;
      --text: #111111;
      --muted: #6b7280;
      --primary: #cd6a3e;
      --primary-dark: #b85a32;
      --focus: #007aff;
      --shadow: 0 8px 30px rgba(24, 23, 22, 0.08);
      --radius: 16px;
      --chat-blue: #007aff;
      --chat-blue-soft: #d8e9ff;
      --chat-green: #34c759;
      --chat-green-soft: #d9f6e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #f2f2f7;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .header {
      padding: 10px 12px;
      color: #111111;
      background: #f5f5f7;
      border-bottom: 1px solid var(--border);
    }

    .header[hidden] {
      display: none;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-brand {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid #d8dbe2;
      background: #ffffff;
      color: #1a1a1a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .header-brand-text {
      min-width: 0;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .header-kicker {
      margin: 2px 0 0;
      font-size: 13px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .header-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #656b78;
      background: transparent;
    }

    .header-btn:hover {
      background: #e9ebf0;
      color: #1a1a1a;
    }

    .header-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .avatars { display: none; }

    .avatar {
      width: 34px;
      height: 34px;
      margin-left: -8px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.26);
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .avatar.ai {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.95);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
    }

    h1 { display: none; }

    .header-sub { display: none; }

    .header-cta { display: none; }

    .spaces {
      position: relative;
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }

    .space {
      position: absolute;
      inset: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
    }

    .space[hidden] {
      display: none;
    }

    .home-list {
      padding: 14px 16px 18px;
      display: grid;
      gap: 12px;
    }

    .card {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
      text-align: left;
      padding: 14px;
      box-shadow: 0 1px 0 rgba(22, 23, 24, 0.02);
    }

    .card:hover {
      border-color: #dadce3;
      background: #fcfcfd;
    }

    .card.recent {
      cursor: default;
      background: var(--surface);
      box-shadow: none;
    }

    .card-title {
      display: block;
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .card-copy {
      display: block;
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .messages-space {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #d7d9df transparent;
    }

    .bubble-user {
      margin: 0 0 0 auto;
      max-width: 76%;
      border-radius: 18px;
      background: var(--chat-blue);
      color: #ffffff;
      padding: 10px 13px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .answer {
      margin: 0 auto 0 0;
      max-width: 78%;
      border-radius: 18px;
      background: var(--chat-green-soft);
      padding: 10px 13px;
      border: 1px solid rgba(52, 199, 89, 0.25);
    }

    .answer-head {
      display: none;
    }

    .answer-avatar {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #ea8f62);
    }

    .answer-name {
      font-size: 14px;
      font-weight: 700;
    }

    .ai-label {
      border-radius: 999px;
      background: #e8eaef;
      color: #596071;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
    }

    .answer-body {
      margin: 0;
      font-size: 14px;
      line-height: 1.52;
      white-space: pre-wrap;
      color: #12301e;
    }

    .sources {
      display: none;
    }

    .source {
      border: 1px solid #d9dde6;
      border-radius: 999px;
      padding: 5px 10px;
      background: #ffffff;
      color: #385fca;
      font-size: 12px;
      line-height: 1.2;
    }

    .feedback {
      display: none;
    }

    .feedback button {
      width: 30px;
      height: 30px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: #82889a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .feedback button:hover {
      border-color: #d8dde9;
      background: #ffffff;
      color: #3e4e76;
    }

    .feedback svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .typing {
      width: fit-content;
      border-radius: 16px;
      background: #eef9f1;
      border: 1px solid rgba(52, 199, 89, 0.2);
      padding: 10px 12px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #61a974;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.4;
        transform: translateY(0);
      }

      50% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    .quick {
      margin-top: auto;
      padding: 10px 16px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: #ffffff;
      border-top: 1px solid #eceff5;
    }

    .chip {
      border: 1px solid #d9deea;
      border-radius: 999px;
      background: #f3f4f8;
      color: #2f3a51;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 12px;
      white-space: nowrap;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .chip:hover {
      background: #eceff5;
      border-color: #cfd5e2;
    }

    .help-search-wrap {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #eef0f4;
    }

    .help-search {
      width: 100%;
      height: 42px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: var(--surface);
      color: #2d313a;
      padding: 0 14px;
      font-size: 14px;
    }

    .help-search:focus-visible {
      border-color: #d8dce5;
      background: #ffffff;
    }

    .help-list {
      padding: 6px 16px 16px;
    }

    .help-collection {
      margin: 14px 0 8px;
      color: #72788a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .help-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #eff1f5;
      background: transparent;
      text-align: left;
      padding: 12px 0;
    }

    .help-item:last-child {
      border-bottom-color: transparent;
    }

    .help-item-title {
      display: block;
      color: #1f2430;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .help-item-copy {
      display: block;
      color: #6f7585;
      font-size: 13px;
      line-height: 1.4;
    }

    .help-empty {
      margin: 20px 0 0;
      color: #6f7585;
      font-size: 13px;
    }

    .composer {
      min-height: 0;
      max-height: 0;
      opacity: 0;
      transform: translateY(22px);
      pointer-events: none;
      margin: 0 12px 8px;
      border: 2px solid #141414;
      border-radius: 22px;
      padding: 8px 10px 9px;
      background: #ffffff;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      transition:
        opacity 280ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 340ms cubic-bezier(0.22, 1, 0.36, 1),
        max-height 340ms cubic-bezier(0.22, 1, 0.36, 1),
        margin 340ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .composer.is-visible {
      min-height: 84px;
      max-height: 160px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      margin-bottom: 12px;
    }

    .icon-btn {
      order: 2;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #8d93a2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #f1f3f8;
      color: #5d6a83;
    }

    .icon-btn svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    .composer textarea {
      order: 1;
      width: 100%;
      min-height: 28px;
      max-height: 92px;
      border: 0;
      resize: none;
      padding: 5px 0 2px;
      background: transparent;
      color: #1f222a;
      font-size: 17px;
      line-height: 1.45;
    }

    .composer textarea:focus {
      outline: none;
    }

    .send {
      order: 3;
      margin-left: auto;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 999px;
      background: #007aff;
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 160ms ease, opacity 160ms ease;
    }

    .send:hover {
      background: #0067d8;
    }

    .send:disabled {
      background: #d2d6de;
      color: #f4f6f8;
      cursor: default;
    }

    .send svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .tabs {
      height: 62px;
      max-height: 62px;
      border-top: 1px solid var(--border);
      background: #ffffff;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      overflow: hidden;
      transition:
        opacity 260ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
        max-height 320ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 240ms ease;
    }

    .tabs.is-hidden {
      opacity: 0;
      transform: translateY(24px);
      max-height: 0;
      pointer-events: none;
      border-top-color: transparent;
    }

    .tab {
      border: 0;
      background: transparent;
      color: #8a90a1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding-top: 2px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.01em;
      position: relative;
      transition: color 180ms ease, background 220ms ease;
    }

    .tab svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .tab span {
      display: block;
      min-height: 12px;
      line-height: 1;
    }

    .tab.active {
      color: var(--primary);
    }

    .tab.active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: currentColor;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.7);
      color: #646b7d;
    }

    .is-entering {
      opacity: 0;
      transform: translateY(8px) scale(0.99);
      animation: message-in 240ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes message-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="header-brand">
        <span class="header-logo" aria-hidden="true">✷</span>
        <div class="header-brand-text">
          <div class="header-title">Sophie</div>
          <p class="header-kicker">Het team kan ook helpen</p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="header-btn" aria-label="Meer opties">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 12a1.5 1.5 0 1 0 0 .01V12Zm5 0a1.5 1.5 0 1 0 0 .01V12Zm5 0a1.5 1.5 0 1 0 0 .01V12Z"></path>
          </svg>
        </button>
        <button type="button" class="header-btn" id="btn-close" aria-label="Sluit chatvenster">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.3 6.7a1 1 0 0 0-1.4 0L12 10.59 8.11 6.7a1 1 0 0 0-1.42 1.4L10.59 12l-3.9 3.89a1 1 0 1 0 1.42 1.42L12 13.41l3.9 3.9a1 1 0 1 0 1.4-1.42L13.41 12l3.89-3.9a1 1 0 0 0 0-1.4Z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="avatars" aria-hidden="true">
      <span class="avatar"></span>
      <span class="avatar"></span>
      <span class="avatar ai">AI</span>
    </div>

    <h1>Hoi</h1>
    <p class="header-sub">Stel je vraag aan Sophie, de AI-assistent voor lokale overheden.</p>
    <button type="button" class="header-cta" id="btn-ask">Start een gesprek</button>
  </header>

  <main class="spaces" aria-live="polite">
    <section class="space" data-space="home" aria-label="Home">
      <div class="home-list">
        <article class="card recent" aria-hidden="true">
          <span class="card-title">Recente sessie</span>
          <span class="card-copy">Sophie helpt met afspraken, meldingen en routing naar de juiste dienst.</span>
        </article>

        <button type="button" class="card" data-intent="afspraak">
          <span class="card-title">Afspraken organiseren</span>
          <span class="card-copy">Leid inwoners direct naar het juiste loket en juiste documenten.</span>
        </button>

        <button type="button" class="card" data-intent="melding">
          <span class="card-title">Meldingen opvolgen</span>
          <span class="card-copy">Versnel verwerking van meldingen uit de openbare ruimte.</span>
        </button>

        <button type="button" class="card" data-intent="dienst">
          <span class="card-title">Naar juiste dienst</span>
          <span class="card-copy">Routeer vragen automatisch naar de correcte interne dienst.</span>
        </button>
      </div>
    </section>

    <section class="space messages-space" data-space="messages" aria-label="Berichten" hidden>
      <div class="messages" id="messages"></div>
      <div class="quick" id="quick"></div>
    </section>

    <section class="space" data-space="help" aria-label="Help" hidden>
      <div class="help-search-wrap">
        <input id="help-search" class="help-search" type="text" placeholder="Zoek in help-artikelen" />
      </div>
      <div class="help-list" id="help-list"></div>
    </section>
  </main>

  <form class="composer" id="composer">
    <button type="button" class="icon-btn" aria-label="Bijlage (demo)">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M16.5 6.5a4.5 4.5 0 0 0-6.36 0l-5.3 5.3a3.25 3.25 0 0 0 4.6 4.6l5.3-5.3a2 2 0 0 0-2.83-2.83l-4.6 4.6a.75.75 0 1 0 1.06 1.06l4.6-4.6a.5.5 0 0 1 .71.71l-5.3 5.3a1.75 1.75 0 0 1-2.48-2.48l5.3-5.3a3 3 0 1 1 4.24 4.24l-5.66 5.66a4.75 4.75 0 1 1-6.72-6.72l5.66-5.66a.75.75 0 0 0-1.06-1.06L2.6 9.02a6.25 6.25 0 0 0 8.84 8.84l5.66-5.66a4.5 4.5 0 0 0 0-6.36Z"></path>
      </svg>
    </button>
    <textarea id="input" rows="1" placeholder="Schrijf een bericht..."></textarea>
    <button type="submit" class="send" id="send" aria-label="Versturen">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4.74 3.58a1 1 0 0 0-1.32 1.3l2.43 5.94a1 1 0 0 0 .92.62h7.98a.5.5 0 0 1 0 1H6.77a1 1 0 0 0-.92.62L3.42 19a1 1 0 0 0 1.31 1.3l16.5-6.73a1 1 0 0 0 0-1.86L4.74 3.58Z"></path>
      </svg>
    </button>
  </form>

  <nav class="tabs" id="tabs" aria-label="Chat navigatie">
    <button type="button" class="tab active" data-tab="home" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4.5 4 10.7V19a1 1 0 0 0 1 1h4.9a1 1 0 0 0 1-1v-4.25h2.2V19a1 1 0 0 0 1 1H19a1 1 0 0 0 1-1v-8.3L12 4.5Zm0-1.9a1 1 0 0 1 .62.22l8.7 6.75a1 1 0 1 1-1.24 1.56L19.5 10.7V19a2.5 2.5 0 0 1-2.5 2.5h-2.9A2.5 2.5 0 0 1 11.6 19v-2.75h-.2V19a2.5 2.5 0 0 1-2.5 2.5H6A2.5 2.5 0 0 1 3.5 19v-8.3l-.58.44a1 1 0 1 1-1.24-1.56l8.7-6.75A1 1 0 0 1 12 2.6Z"></path>
      </svg>
      <span>Home</span>
    </button>
    <button type="button" class="tab" data-tab="messages">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 3.5A2.5 2.5 0 0 0 2.5 6v8A2.5 2.5 0 0 0 5 16.5h1.54l2.37 2.9a1 1 0 0 0 1.55 0l2.37-2.9H19A2.5 2.5 0 0 0 21.5 14V6A2.5 2.5 0 0 0 19 3.5H5ZM4 6a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1h-6.66a1 1 0 0 0-.77.37L10 17.24l-1.57-1.87a1 1 0 0 0-.77-.37H5a1 1 0 0 1-1-1V6Z"></path>
      </svg>
      <span>Berichten</span>
    </button>
    <button type="button" class="tab" data-tab="help">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2.5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 12 2.5Zm0 17.5a8 8 0 1 1 8-8 8.01 8.01 0 0 1-8 8Zm-.05-12a3.21 3.21 0 0 0-3.2 3.2.75.75 0 0 0 1.5 0 1.7 1.7 0 1 1 2.9 1.2c-.99 1.02-1.62 1.7-1.62 3.05a.75.75 0 0 0 1.5 0c0-.72.3-1.1 1.2-2.04a3.2 3.2 0 0 0-2.28-5.46Zm.05 9.45a1.05 1.05 0 1 0 0 2.1 1.05 1.05 0 0 0 0-2.1Z"></path>
      </svg>
      <span>Help</span>
    </button>
  </nav>

  <script>
    const QUICK_START = [
      { id: "afspraak", label: "Afspraken maken" },
      { id: "melding", label: "Melding openbare ruimte" },
      { id: "dienst", label: "Juiste dienst vinden" },
      { id: "uitleg", label: "Hoe werkt Sophie?" }
    ];

    const HELP_COLLECTIONS = [
      {
        title: "Starten met Sophie",
        items: [
          {
            title: "Sophie activeren op je website",
            body: "Voeg de widgetscriptregel toe en activeer SmartRouting in de beheeromgeving.",
            intent: "uitleg"
          },
          {
            title: "Welke vragen kan Sophie beantwoorden?",
            body: "Loketvragen, procedures, documenten en routing naar de juiste dienst.",
            intent: "uitleg"
          }
        ]
      },
      {
        title: "Integraties",
        items: [
          {
            title: "Afspraken koppelen",
            body: "Sophie kan koppelen met je bestaand afsprakenplatform.",
            intent: "afspraak"
          },
          {
            title: "Meldingen opvolgen",
            body: "Sophie structureert meldingen en zet ze door naar de juiste dienst.",
            intent: "melding"
          }
        ]
      }
    ];

    const INTENTS = {
      afspraak: {
        lines: [
          "Sophie structureert afspraakvragen zodat inwoners direct op het juiste loket en tijdslot landen.",
          "Dat vermindert foutieve boekingen, wachttijd en extra telefoonverkeer."
        ],
        sources: ["Afsprakenflow", "Loketroutering"],
        quick: [{ id: "dienst", label: "Naar juiste dienst" }, { id: "uitleg", label: "Hoe werkt Sophie?" }]
      },
      melding: {
        lines: [
          "Voor meldingen openbare ruimte verzamelt Sophie locatie, prioriteit en context in een bruikbaar format.",
          "Daarna wordt de melding toegewezen aan de correcte interne dienst met duidelijke opvolgstap."
        ],
        sources: ["Meldingenmodule", "Diensttoewijzing"],
        quick: [{ id: "dienst", label: "Naar juiste dienst" }, { id: "uitleg", label: "AI-routing uitleg" }]
      },
      dienst: {
        lines: [
          "Sophie gebruikt SmartRouting om op basis van context de juiste dienst en contactpersoon te selecteren.",
          "Bij onzekerheid schakelt Sophie veilig door naar een menselijke collega."
        ],
        sources: ["SmartRouting", "Handoverbeleid"],
        quick: [{ id: "afspraak", label: "Afsprakenpad" }, { id: "melding", label: "Meldingenpad" }]
      },
      uitleg: {
        lines: [
          "Deze demo toont de frontlaag van Sophie voor lokale besturen.",
          "In productie koppelen we gemeentelijke procedures, website-inhoud en dienststructuren."
        ],
        sources: ["Demo architectuur", "Gemeentelijke kennislaag"],
        quick: [{ id: "afspraak", label: "Afspraken maken" }, { id: "melding", label: "Meldingen verwerken" }]
      },
      fallback: {
        lines: [
          "Goede vraag. In deze demo focussen we op afspraken, meldingen en routing naar de juiste dienst.",
          "Kies gerust een suggestie hieronder en ik toon meteen de juiste flow."
        ],
        sources: ["Demodata"],
        quick: QUICK_START
      }
    };

    const appState = {
      activeTab: "home",
      started: false,
      busy: false,
      typingNode: null
    };

    const spaces = Array.from(document.querySelectorAll("[data-space]"));
    const tabs = document.getElementById("tabs");
    const homeHero = document.querySelector(".header");
    const btnClose = document.getElementById("btn-close");
    const btnAsk = document.getElementById("btn-ask");
    const cards = Array.from(document.querySelectorAll(".card[data-intent]"));
    const messages = document.getElementById("messages");
    const quick = document.getElementById("quick");
    const composer = document.getElementById("composer");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const helpSearch = document.getElementById("help-search");
    const helpList = document.getElementById("help-list");

    function postToParent(payload) {
      try {
        window.parent.postMessage(payload, "*");
      } catch (_) {}
    }

    function normalize(text) {
      return text.toLowerCase().normalize("NFD").replace(/\p{M}/gu, "");
    }

    function scrollMessages(behavior = "auto") {
      window.requestAnimationFrame(() => {
        messages.scrollTo({ top: messages.scrollHeight, behavior });
      });
    }

    function animateEntry(node, delay = 0) {
      if (!(node instanceof HTMLElement)) return;
      node.classList.add("is-entering");
      if (delay > 0) node.style.animationDelay = delay + "ms";
      node.addEventListener(
        "animationend",
        () => {
          node.classList.remove("is-entering");
          node.style.removeProperty("animation-delay");
        },
        { once: true }
      );
    }

    function resetTyping() {
      if (!appState.typingNode) return;
      appState.typingNode.remove();
      appState.typingNode = null;
    }

    function showTyping() {
      resetTyping();
      const node = document.createElement("div");
      node.className = "typing";
      node.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(node);
      animateEntry(node);
      appState.typingNode = node;
      scrollMessages();
    }

    function addUserBubble(text) {
      const bubble = document.createElement("p");
      bubble.className = "bubble-user";
      bubble.textContent = text;
      messages.appendChild(bubble);
      animateEntry(bubble);
      scrollMessages();
    }

    function addAnswerCard(lines, sources) {
      const card = document.createElement("article");
      card.className = "answer";
      card.innerHTML =
        '<header class="answer-head"><span class="answer-avatar" aria-hidden="true"></span><span class="answer-name">Sophie</span><span class="ai-label">AI Agent</span></header>';

      const body = document.createElement("p");
      body.className = "answer-body";
      body.textContent = lines.join("\n\n");

      const sourceRow = document.createElement("div");
      sourceRow.className = "sources";
      sources.forEach((source) => {
        const sourceBadge = document.createElement("button");
        sourceBadge.type = "button";
        sourceBadge.className = "source";
        sourceBadge.textContent = source;
        sourceRow.appendChild(sourceBadge);
      });

      const feedback = document.createElement("div");
      feedback.className = "feedback";
      feedback.innerHTML =
        '<button type="button" aria-label="Nuttig antwoord"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 3.5a1 1 0 0 1 .97.76l.9 3.84h4.5a2 2 0 0 1 1.92 2.57l-2.35 7.75A2.5 2.5 0 0 1 14.55 20H9a2 2 0 0 1-2-2v-7.5a1 1 0 0 1 .3-.7l3-2.95V4.5a1 1 0 0 1 1-1Zm1.08 6.6a1 1 0 0 1-.96-.73l-.12-.47-2 1.98V18h5.55a.5.5 0 0 0 .48-.35l2.34-7.76a.5.5 0 0 0-.48-.64h-4.8Z"></path></svg></button><button type="button" aria-label="Niet nuttig antwoord"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 20.5a1 1 0 0 1-.97-.76l-.9-3.84h-4.5a2 2 0 0 1-1.92-2.57l2.35-7.75A2.5 2.5 0 0 1 9.45 4H15a2 2 0 0 1 2 2v7.5a1 1 0 0 1-.3.7l-3 2.95v2.35a1 1 0 0 1-1 1Zm-1.08-6.6a1 1 0 0 1 .96.73l.12.47 2-1.98V6H9.45a.5.5 0 0 0-.48.35L6.63 14.1a.5.5 0 0 0 .48.64h4.8Z"></path></svg></button>';

      card.append(body, sourceRow, feedback);
      messages.appendChild(card);
      animateEntry(card);
      Array.from(sourceRow.children).forEach((el, index) => animateEntry(el, 40 + index * 35));
      scrollMessages();
    }

    function setQuickReplies(items) {
      quick.replaceChildren();
      items.forEach((item) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.dataset.intent = item.id;
        chip.textContent = item.label;
        quick.appendChild(chip);
      });
      scrollMessages();
    }

    function setTab(tab) {
      appState.activeTab = tab;
      spaces.forEach((space) => {
        const isActive = space.dataset.space === tab;
        space.hidden = !isActive;
        space.setAttribute("aria-hidden", String(!isActive));
      });

      if (homeHero instanceof HTMLElement) {
        const isHome = tab === "home";
        homeHero.classList.toggle("is-home", isHome);
      }

      Array.from(tabs.querySelectorAll(".tab")).forEach((tabButton) => {
        const isActive = tabButton.dataset.tab === tab;
        tabButton.classList.toggle("active", isActive);
        if (isActive) {
          tabButton.setAttribute("aria-current", "page");
        } else {
          tabButton.removeAttribute("aria-current");
        }
      });

      const isMessages = tab === "messages";
      composer.classList.toggle("is-visible", isMessages);
      tabs.classList.toggle("is-hidden", isMessages);
      if (isMessages) {
        postToParent({ type: "sophieWidgetUnread", count: 0 });
        scrollMessages();
        input.focus();
      }
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function resolveIntent(text) {
      const value = normalize(text);
      if (value.includes("afspraak")) return "afspraak";
      if (value.includes("melding")) return "melding";
      if (value.includes("dienst") || value.includes("contact")) return "dienst";
      if (value.includes("hoe") || value.includes("werkt") || value.includes("uitleg")) return "uitleg";
      return "fallback";
    }

    async function runReply(intentKey) {
      const intent = INTENTS[intentKey] || INTENTS.fallback;
      showTyping();
      await sleep(520 + Math.random() * 380);
      resetTyping();
      addAnswerCard(intent.lines, intent.sources);
      setQuickReplies(intent.quick || QUICK_START);
    }

    async function handlePrompt(text, intentKey) {
      if (appState.busy) return;
      appState.busy = true;
      addUserBubble(text);
      try {
        await runReply(intentKey);
      } finally {
        appState.busy = false;
        scrollMessages();
      }
    }

    async function ensureConversationStarted() {
      if (appState.started) return;
      appState.started = true;
      addAnswerCard(["Hallo, ik ben Sophie. Ik help lokale overheden met slimme dienstverlening."], ["Sophie Intro"]);
      await runReply("fallback");
    }

    function autoResizeInput() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 92) + "px";
    }

    function updateSendVisibility() {
      send.disabled = input.value.trim().length === 0;
    }

    function renderHelp(query) {
      const q = normalize(query || "");
      helpList.replaceChildren();

      let hasMatch = false;
      HELP_COLLECTIONS.forEach((collection) => {
        const matchingItems = collection.items.filter((item) => {
          return !q || normalize(item.title).includes(q) || normalize(item.body).includes(q);
        });
        if (!matchingItems.length) return;
        hasMatch = true;

        const title = document.createElement("p");
        title.className = "help-collection";
        title.textContent = collection.title;
        helpList.appendChild(title);

        matchingItems.forEach((item) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "help-item";
          row.innerHTML = '<span class="help-item-title">' + item.title + '</span><span class="help-item-copy">' + item.body + "</span>";
          row.addEventListener("click", async () => {
            await ensureConversationStarted();
            setTab("messages");
            await handlePrompt("Help: " + item.title, item.intent || "uitleg");
          });
          helpList.appendChild(row);
        });
      });

      if (!hasMatch) {
        const empty = document.createElement("p");
        empty.className = "help-empty";
        empty.textContent = "Geen resultaten. Probeer een andere zoekterm.";
        helpList.appendChild(empty);
      }
    }

    btnClose.addEventListener("click", () => {
      postToParent({ type: "sophieWidgetClose" });
    });

    btnAsk.addEventListener("click", async () => {
      setTab("messages");
      await ensureConversationStarted();
    });

    tabs.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const clickedTab = target.closest(".tab");
      if (!(clickedTab instanceof HTMLButtonElement)) return;

      const nextTab = clickedTab.dataset.tab || "home";
      setTab(nextTab);
      if (nextTab === "messages") {
        await ensureConversationStarted();
      }
    });

    cards.forEach((card) => {
      card.addEventListener("click", async () => {
        const intent = card.dataset.intent;
        if (!intent) return;
        await ensureConversationStarted();
        setTab("messages");
        const title = card.querySelector(".card-title")?.textContent || "Nieuwe vraag";
        await handlePrompt(title, intent);
      });
    });

    quick.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const intent = target.dataset.intent;
      if (!intent) return;
      await handlePrompt(target.textContent || "Nieuwe vraag", intent);
    });

    composer.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text || appState.busy) return;

      input.value = "";
      autoResizeInput();
      updateSendVisibility();

      await handlePrompt(text, resolveIntent(text));
      input.focus();
    });

    input.addEventListener("input", () => {
      autoResizeInput();
      updateSendVisibility();
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composer.requestSubmit();
      }
    });

    helpSearch.addEventListener("input", () => {
      renderHelp(helpSearch.value);
    });

    renderHelp("");
    autoResizeInput();
    updateSendVisibility();
    setQuickReplies(QUICK_START);
    setTab("messages");
    ensureConversationStarted();
  </script>
</body>
</html>
