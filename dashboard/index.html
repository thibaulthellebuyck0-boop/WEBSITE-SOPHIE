<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Sophie beheer — dashboard." />
  <title>Sophie — Beheer</title>
  <link rel="stylesheet" href="minimal.css?v=1" />
  <script src="../auth.js?v=2"></script>
  <script>
    (function () {
      if (!window.SophieAuth) {
        window.location.replace("../login.html?next=" + encodeURIComponent("dashboard/index.html"));
        return;
      }
      window.SophieAuth.consumeDemoAuthFromUrl();
      if (!window.SophieAuth.isLoggedIn()) {
        window.location.replace("../login.html?next=" + encodeURIComponent("dashboard/index.html"));
      }
    })();
  </script>
</head>
<body>
  <button type="button" class="dash-sidebar-toggle" id="dash-sidebar-toggle" aria-expanded="false" aria-controls="dash-sidebar" aria-label="Menu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <div class="dash-app" id="dash-app">
    <div class="dash-backdrop" id="dash-backdrop" aria-hidden="true"></div>

    <aside class="dash-sidebar dash-sidebar--rail dash-sidebar--minimal" id="dash-sidebar" aria-label="Hoofdnavigatie">
      <span class="visually-hidden">Sophie — beheer</span>
      <nav class="dash-nav dash-nav--widgets" aria-label="Secties">
        <button type="button" class="dash-widget" data-dash-view="dashboard" aria-current="page" aria-label="Dashboard" title="Dashboard">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="9" rx="1" />
            <rect x="14" y="3" width="7" height="5" rx="1" />
            <rect x="14" y="11" width="7" height="10" rx="1" />
            <rect x="3" y="15" width="7" height="6" rx="1" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="smartrouting" aria-label="SmartRouting" title="SmartRouting">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3" />
            <circle cx="6" cy="12" r="3" />
            <circle cx="18" cy="19" r="3" />
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="agenda" aria-label="Agenda" title="Agenda">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="directcontact" aria-label="Direct contact" title="Direct contact">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="community" aria-label="Community" title="Community">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="instellingen" aria-label="Instellingen" title="Instellingen">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
        <button type="button" class="dash-widget" data-dash-view="meldingen" aria-label="Meldingen" title="Meldingen">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
      </nav>

      <div class="dash-sidebar__foot">
        <button type="button" class="dash-widget dash-widget--foot" id="dash-logout" aria-label="Uitloggen" title="Uitloggen">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
        <a class="dash-widget dash-widget--foot" href="../index.html" aria-label="Publieke website" title="Publieke website">
          <svg class="dash-widget__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
        </a>
      </div>
    </aside>

    <main class="dash-main" id="dash-main">
      <section class="dash-panel" id="panel-dashboard">
        <div class="dash-welcome-wrap">
          <h1 class="dash-welcome" id="dash-typed-welcome"></h1>
          <section class="dash-setup-zone" id="dash-setup-zone" aria-label="Sophie setup">
            <section class="dash-inline-terminal" id="dash-inline-terminal" aria-labelledby="dash-inline-terminal-title">
              <h2 id="dash-inline-terminal-title" class="visually-hidden">Sophie setupgesprek</h2>
              <div id="dash-setup-log" class="dash-inline-terminal__log" role="log" aria-live="polite" aria-atomic="false"></div>
              <form id="dash-setup-form" class="dash-inline-terminal__prompt" hidden>
                <span class="dash-inline-terminal__label" aria-hidden="true">beheer@sophie %</span>
                <div class="dash-inline-terminal__field-wrap">
                  <label class="visually-hidden" for="dash-setup-input">Typ een antwoord voor Sophie</label>
                  <span id="dash-setup-mirror" class="dash-inline-terminal__mirror" aria-hidden="true"></span>
                  <span class="dash-inline-terminal__caret" aria-hidden="true"></span>
                  <input
                    id="dash-setup-input"
                    class="dash-inline-terminal__input"
                    type="text"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="Typ je antwoord en druk op Enter"
                    aria-autocomplete="list"
                    aria-controls="dash-setup-suggestions"
                    aria-expanded="false"
                  />
                  <ul id="dash-setup-suggestions" class="dash-inline-terminal__suggestions" role="listbox" hidden></ul>
                </div>
              </form>
            </section>
            <aside class="dash-map-widget" id="dash-map-widget" aria-label="Kaartweergave" hidden>
              <div id="dash-map-canvas" class="dash-map-widget__canvas" aria-hidden="true"></div>
            </aside>
          </section>
        </div>
      </section>

      <section class="dash-panel" id="panel-smartrouting" hidden></section>
      <section class="dash-panel" id="panel-agenda" hidden></section>
      <section class="dash-panel" id="panel-directcontact" hidden></section>
      <section class="dash-panel" id="panel-community" hidden></section>
      <section class="dash-panel" id="panel-instellingen" hidden></section>
      <section class="dash-panel" id="panel-meldingen" hidden></section>
    </main>
  </div>

  <script src="minimal.js?v=1" defer></script>
</body>
</html>
